<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PixelChat">
<meta name="theme-color" content="#00ff41">
<link rel="manifest" href="./manifest.json">
<title>PIXEL CHAT</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --white: #ffffff;
    --green: #00ff41;
    --green2: #00cc33;
    --dark-green: #003311;
    --gray: #333333;
    --light-gray: #888888;
    --red: #ff0000;
    --yellow: #ffff00;
    --blue: #0088ff;
    --bg: #0a0a0a;
    --panel: #111111;
    --pixel: 'Press Start 2P', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: var(--pixel);
    color: var(--green);
    overflow: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.95; }
    94% { opacity: 1; }
    96% { opacity: 0.98; }
  }

  body { animation: flicker 8s infinite; }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: rgba(0,255,65,0.08);
    animation: scanline 6s linear infinite;
    pointer-events: none;
    z-index: 9998;
  }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  header {
    background: var(--black);
    border-bottom: 3px solid var(--green);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 0 20px rgba(0,255,65,0.4);
    flex-shrink: 0;
  }

  .logo {
    font-size: 0.55rem;
    color: var(--green);
    text-shadow: 0 0 10px var(--green);
    letter-spacing: 2px;
  }

  .logo span { color: var(--yellow); text-shadow: 0 0 10px var(--yellow); }

  .status-led {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.4rem;
    color: var(--light-gray);
  }

  .led {
    width: 10px; height: 10px;
    border-radius: 0;
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
    transition: all 0.3s;
  }

  .led.on {
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    animation: ledPulse 2s infinite;
  }

  @keyframes ledPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  #screen-connect {
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 16px;
  }

  .pixel-title {
    font-size: 0.5rem;
    color: var(--green);
    text-shadow: 0 0 15px var(--green);
    text-align: center;
    line-height: 2;
    letter-spacing: 1px;
  }

  .pixel-title .cursor { animation: blink 1s infinite; }

  .pixel-btn {
    font-family: var(--pixel);
    font-size: 0.5rem;
    padding: 14px 20px;
    background: var(--black);
    color: var(--green);
    border: 3px solid var(--green);
    cursor: pointer;
    text-align: left;
    transition: all 0.1s;
    box-shadow: 4px 4px 0 var(--green2);
    letter-spacing: 1px;
    width: 100%;
  }

  .pixel-btn::before { content: '▶ '; color: var(--yellow); }

  .pixel-btn:hover, .pixel-btn:active {
    background: var(--dark-green);
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--green2);
    text-shadow: 0 0 8px var(--green);
  }

  .pixel-btn.danger { color: var(--red); border-color: var(--red); box-shadow: 4px 4px 0 #880000; }
  .pixel-btn.danger::before { color: var(--red); }
  .pixel-btn.danger:hover { background: #110000; box-shadow: 2px 2px 0 #880000; }

  .pixel-btn.secondary { color: var(--yellow); border-color: var(--yellow); box-shadow: 4px 4px 0 #886600; }
  .pixel-btn.secondary::before { color: var(--yellow); }
  .pixel-btn.secondary:hover { background: #111100; box-shadow: 2px 2px 0 #886600; }

  .divider {
    font-size: 0.4rem;
    color: var(--light-gray);
    text-align: center;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    border-top: 2px solid var(--gray);
  }

  .code-box {
    background: var(--black);
    border: 3px solid var(--green);
    padding: 12px;
    width: 100%;
    box-shadow: inset 0 0 10px rgba(0,255,65,0.1);
  }

  .code-label {
    font-size: 0.35rem;
    color: var(--light-gray);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .code-value {
    font-size: 0.45rem;
    color: var(--yellow);
    text-shadow: 0 0 8px var(--yellow);
    word-break: break-all;
    line-height: 1.8;
    min-height: 20px;
  }

  .pixel-input {
    font-family: var(--pixel);
    font-size: 0.5rem;
    background: var(--black);
    color: var(--green);
    border: 3px solid var(--green);
    padding: 10px 12px;
    width: 100%;
    outline: none;
    box-shadow: inset 0 0 8px rgba(0,255,65,0.1);
    letter-spacing: 1px;
  }

  .pixel-input::placeholder { color: var(--gray); }
  .pixel-input:focus { box-shadow: inset 0 0 8px rgba(0,255,65,0.2), 0 0 10px rgba(0,255,65,0.3); }

  .info-text {
    font-size: 0.35rem;
    color: var(--light-gray);
    text-align: center;
    line-height: 2;
  }

  .info-text span { color: var(--green); }

  #screen-waiting {
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 16px;
  }

  .loading-text {
    font-size: 0.4rem;
    color: var(--green);
    text-align: center;
    line-height: 2.5;
    animation: blink 1.5s infinite;
  }

  .progress-bar {
    width: 100%;
    height: 12px;
    background: var(--black);
    border: 2px solid var(--green);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: progressAnim 2s steps(20) infinite;
  }

  @keyframes progressAnim {
    0% { width: 0%; }
    50% { width: 80%; }
    100% { width: 100%; }
  }

  .copy-btn {
    font-family: var(--pixel);
    font-size: 0.35rem;
    background: var(--black);
    color: var(--yellow);
    border: 2px solid var(--yellow);
    padding: 6px 10px;
    cursor: pointer;
    margin-top: 6px;
    box-shadow: 2px 2px 0 #886600;
    transition: all 0.1s;
    width: 100%;
  }

  .copy-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 #886600; }

  #screen-chat {
    flex: 1;
    overflow: hidden;
  }

  .chat-info {
    background: var(--black);
    border-bottom: 2px solid var(--gray);
    padding: 8px 16px;
    font-size: 0.35rem;
    color: var(--light-gray);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .chat-info .peer { color: var(--green); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--green) var(--black);
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: var(--black); }
  .messages::-webkit-scrollbar-thumb { background: var(--green); }

  .msg {
    max-width: 80%;
    animation: msgIn 0.15s steps(3) forwards;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.me { align-self: flex-end; }
  .msg.them { align-self: flex-start; }

  .msg-header {
    font-size: 0.3rem;
    margin-bottom: 4px;
    color: var(--light-gray);
  }

  .msg.me .msg-header { text-align: right; color: var(--blue); }
  .msg.them .msg-header { color: var(--green); }

  .msg-bubble {
    padding: 10px 12px;
    font-size: 0.42rem;
    line-height: 1.8;
    word-break: break-word;
  }

  .msg.me .msg-bubble {
    background: var(--dark-green);
    border: 2px solid var(--green);
    border-right: 4px solid var(--green);
    color: var(--white);
  }

  .msg.them .msg-bubble {
    background: #0a0a1a;
    border: 2px solid var(--blue);
    border-left: 4px solid var(--blue);
    color: var(--white);
  }

  .msg-time {
    font-size: 0.28rem;
    color: var(--gray);
    margin-top: 3px;
    text-align: right;
  }

  .system-msg {
    text-align: center;
    font-size: 0.35rem;
    color: var(--yellow);
    padding: 6px;
    border: 1px dashed var(--gray);
    animation: msgIn 0.2s steps(2) forwards;
  }

  .typing-indicator {
    display: none;
    align-self: flex-start;
    padding: 8px 12px;
    border: 2px solid var(--blue);
    font-size: 0.4rem;
    color: var(--blue);
  }

  .typing-indicator.show { display: block; }

  .input-area {
    border-top: 3px solid var(--green);
    background: var(--black);
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
    box-shadow: 0 -5px 20px rgba(0,255,65,0.2);
  }

  .msg-input {
    flex: 1;
    font-family: var(--pixel);
    font-size: 0.45rem;
    background: var(--black);
    color: var(--green);
    border: 2px solid var(--green);
    padding: 10px;
    outline: none;
    resize: none;
    min-height: 40px;
    max-height: 100px;
    line-height: 1.6;
    scrollbar-width: none;
  }

  .msg-input::placeholder { color: var(--gray); }

  .send-btn {
    font-family: var(--pixel);
    font-size: 0.5rem;
    background: var(--green);
    color: var(--black);
    border: 2px solid var(--green2);
    padding: 10px 14px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--green2);
    transition: all 0.1s;
    white-space: nowrap;
    align-self: flex-end;
  }

  .send-btn:hover, .send-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--green2);
  }

  .dc-btn {
    font-family: var(--pixel);
    font-size: 0.35rem;
    background: var(--black);
    color: var(--red);
    border: 1px solid var(--red);
    padding: 4px 8px;
    cursor: pointer;
  }

  .error-msg {
    font-size: 0.38rem;
    color: var(--red);
    text-align: center;
    padding: 10px;
    border: 2px dashed var(--red);
    line-height: 2;
    display: none;
    width: 100%;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="app">
  <header>
    <div class="logo">PIXEL<span>CHAT</span> v1.0</div>
    <div class="status-led">
      <div class="led" id="led"></div>
      <span id="led-text">OFFLINE</span>
    </div>
  </header>

  <!-- CONNECT -->
  <div class="screen active" id="screen-connect">
    <div class="pixel-title">&gt; BIENVENIDO_<span class="cursor">█</span><br>ELIGE UNA OPCION:</div>
    <div style="display:flex;flex-direction:column;gap:10px;width:100%">
      <button class="pixel-btn" onclick="startAsHost()">CREAR SALA</button>
      <div class="divider">O</div>
      <textarea class="pixel-input" id="join-code" placeholder="PEGA EL CODIGO AQUI..." rows="3" style="resize:none;height:70px"></textarea>
      <button class="pixel-btn secondary" onclick="joinAsGuest()">UNIRSE A SALA</button>
    </div>
    <div class="error-msg" id="error-box">ERROR</div>
    <div class="info-text"><span>★</span> INTERNET SOLO LA PRIMERA VEZ <span>★</span></div>
  </div>

  <!-- WAITING -->
  <div class="screen" id="screen-waiting">
    <div class="pixel-title" id="waiting-title">SALA CREADA</div>
    <div class="code-box">
      <div class="code-label" id="code-label">▶ COMPARTE ESTE CODIGO:</div>
      <div class="code-value" id="offer-code">GENERANDO...</div>
    </div>
    <button class="copy-btn" onclick="copyOffer()">[ COPIAR CODIGO ]</button>
    <div class="divider" id="answer-divider">LUEGO</div>
    <div id="answer-section" style="width:100%;display:flex;flex-direction:column;gap:8px">
      <div class="code-label">▶ PEGA EL CODIGO DE TU CONTACTO:</div>
      <textarea class="pixel-input" id="answer-input" placeholder="CODIGO DEL OTRO..." rows="3" style="resize:none;height:70px"></textarea>
      <button class="pixel-btn secondary" onclick="connectWithAnswer()">CONECTAR</button>
    </div>
    <div class="loading-text">ESPERANDO...</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <button class="pixel-btn danger" onclick="cancelConnect()" style="font-size:0.4rem;padding:10px">CANCELAR</button>
  </div>

  <!-- CHAT -->
  <div class="screen" id="screen-chat" style="display:none;flex-direction:column;flex:1;overflow:hidden">
    <div class="chat-info">
      <span>CANAL: <span class="peer">P2P-DIRECTO</span></span>
      <button class="dc-btn" onclick="disconnect()">[ SALIR ]</button>
    </div>
    <div class="messages" id="messages">
      <div class="system-msg">★ CONEXION ESTABLECIDA ★</div>
      <div class="system-msg">YA PUEDEN CHATEAR SIN INTERNET</div>
    </div>
    <div class="typing-indicator" id="typing">EL OTRO ESCRIBE</div>
    <div class="input-area">
      <textarea class="msg-input" id="msg-input" placeholder="ESCRIBE..." rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this); sendTyping()"></textarea>
      <button class="send-btn" onclick="sendMessage()">ENVIAR</button>
    </div>
  </div>
</div>

<script>
const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]
};

let pc = null, dataChannel = null, typingTimer = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.classList.add('active');
}

function setLed(on, text) {
  document.getElementById('led').className = 'led' + (on ? ' on' : '');
  document.getElementById('led-text').textContent = text;
}

function addMessage(text, from) {
  const msgs = document.getElementById('messages');
  const time = new Date().toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
  if (from === 'system') {
    const el = document.createElement('div');
    el.className = 'system-msg';
    el.textContent = text;
    msgs.appendChild(el);
  } else {
    const el = document.createElement('div');
    el.className = 'msg ' + from;
    el.innerHTML = `<div class="msg-header">${from==='me'?'YO':'CONTACTO'}</div><div class="msg-bubble">${escapeHtml(text)}</div><div class="msg-time">${time}</div>`;
    msgs.appendChild(el);
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = 'ERROR: ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function createPC() {
  pc = new RTCPeerConnection(ICE_SERVERS);
  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
      setLed(true, 'ONLINE');
    } else if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
      setLed(false, 'OFFLINE');
      addMessage('★ CONEXION PERDIDA ★', 'system');
    }
  };
  return pc;
}

function setupDataChannel(ch) {
  dataChannel = ch;
  dataChannel.onopen = () => { showScreen('screen-chat'); setLed(true, 'ONLINE'); };
  dataChannel.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'msg') {
        document.getElementById('typing').classList.remove('show');
        addMessage(data.text, 'them');
      } else if (data.type === 'typing') {
        document.getElementById('typing').classList.add('show');
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => document.getElementById('typing').classList.remove('show'), 2000);
      }
    } catch(e) { addMessage(e.data, 'them'); }
  };
  dataChannel.onclose = () => setLed(false, 'OFFLINE');
}

async function waitForICE() {
  await new Promise(resolve => {
    if (pc.iceGatheringState === 'complete') return resolve();
    pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') resolve(); };
    setTimeout(resolve, 4000);
  });
}

async function startAsHost() {
  createPC();
  dataChannel = pc.createDataChannel('chat');
  setupDataChannel(dataChannel);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  showScreen('screen-waiting');
  await waitForICE();
  document.getElementById('offer-code').textContent = btoa(JSON.stringify(pc.localDescription));
}

async function connectWithAnswer() {
  const raw = document.getElementById('answer-input').value.trim();
  if (!raw) return showError('PEGA EL CODIGO');
  try {
    await pc.setRemoteDescription(JSON.parse(atob(raw)));
  } catch(e) { showError('CODIGO INVALIDO'); }
}

async function joinAsGuest() {
  const raw = document.getElementById('join-code').value.trim();
  if (!raw) return showError('PEGA EL CODIGO PRIMERO');
  try {
    const offer = JSON.parse(atob(raw));
    createPC();
    pc.ondatachannel = (e) => setupDataChannel(e.channel);
    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    showScreen('screen-waiting');
    document.getElementById('waiting-title').textContent = 'CONECTANDO...';
    document.getElementById('code-label').textContent = '▶ ENVIA ESTE CODIGO AL CREADOR:';
    document.getElementById('answer-section').style.display = 'none';
    document.getElementById('answer-divider').style.display = 'none';
    await waitForICE();
    document.getElementById('offer-code').textContent = btoa(JSON.stringify(pc.localDescription));
  } catch(e) { showError('CODIGO INVALIDO'); }
}

function copyOffer() {
  const code = document.getElementById('offer-code').textContent;
  navigator.clipboard.writeText(code).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = code; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  });
  document.querySelector('.copy-btn').textContent = '[ ✓ COPIADO! ]';
  setTimeout(() => document.querySelector('.copy-btn').textContent = '[ COPIAR CODIGO ]', 2000);
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !dataChannel || dataChannel.readyState !== 'open') return;
  dataChannel.send(JSON.stringify({ type: 'msg', text }));
  addMessage(text, 'me');
  input.value = '';
  autoResize(input);
}

function sendTyping() {
  if (dataChannel && dataChannel.readyState === 'open') dataChannel.send(JSON.stringify({ type: 'typing' }));
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function disconnect() {
  if (dataChannel) dataChannel.close();
  if (pc) pc.close();
  pc = null; dataChannel = null;
  setLed(false, 'OFFLINE');
  showScreen('screen-connect');
}

function cancelConnect() { disconnect(); }

// ─── SERVICE WORKER ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log('SW registrado'))
    .catch(e => console.log('SW error:', e));
}
</script>
</body>
</html>
